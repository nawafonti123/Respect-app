version: "2"
type: frontend
tech_stack:
  - Dart
  - Flutter
  - Material Design
  - Provider
  - Supabase
  - Firebase Messaging
  - Google Sign-In
  - WebRTC
  - flutter_webrtc
  - flutter_local_notifications
routes:
  - path: /
    file: lib/app/app.dart
    auth_required: false
    description: Splash screen and auth gate that routes to login or home
  - path: /login
    file: lib/screens/login_screen.dart
    auth_required: false
    description: Login and registration screen with email/password and Google sign-in
  - path: /home
    file: lib/screens/home_screen.dart
    auth_required: true
    description: Main shell with drawer navigation to feed, streamers, chat, notifications, profile, settings, admin, saved posts, live streams, and painters
  - path: /feed
    file: lib/screens/feed_screen.dart
    auth_required: true
    description: Social feed with posts, stories, likes, comments, reposts, and media
  - path: /search
    file: lib/screens/search_screen.dart
    auth_required: true
    description: Search users and posts
  - path: /profile
    file: lib/screens/profile_screen.dart
    auth_required: true
    description: User profile with avatar, bio, follow, and posts
  - path: /chat
    file: lib/screens/chat_screen.dart
    auth_required: true
    description: Private messaging conversations
  - path: /notifications
    file: lib/screens/notifications_screen.dart
    auth_required: true
    description: In-app notifications for likes, replies, mentions, and reports
  - path: /settings
    file: lib/screens/settings_screen.dart
    auth_required: true
    description: App settings including theme and account options
  - path: /saved
    file: lib/screens/saved_posts_screen.dart
    auth_required: true
    description: Saved posts collection
  - path: /admin
    file: lib/screens/admin_screen.dart
    auth_required: true
    description: Admin moderation tools for reports and content review
  - path: /streamers
    file: lib/screens/streamers_screen.dart
    auth_required: true
    description: Streamers discovery section
  - path: /live
    file: lib/screens/respect_live_screen.dart
    auth_required: true
    description: Respect live streaming section
  - path: /painters
    file: lib/screens/respect_painters_screen.dart
    auth_required: true
    description: Respect painters community section
features:
  - name: User Login
    description: Sign in with username or email and password
    files:
      - lib/screens/login_screen.dart
      - lib/services/supabase_service.dart
    entry_route: /login
    user_interactions:
      - Fill username or email input field
      - Fill password input field
      - Click login submit button
      - See error message on invalid credentials or banned account
      - Toggle between login and create account modes
    api_calls:
      - method: POST
        endpoint: Supabase Auth signInWithPassword
    auth_required: false
  - name: User Registration
    description: Create a new account with username, email, password, name, and birth date
    files:
      - lib/screens/login_screen.dart
      - lib/services/supabase_service.dart
    entry_route: /login
    user_interactions:
      - Switch to create account mode
      - Fill username, profile name, email, birth date, password, and confirm password
      - Accept terms checkbox
      - Submit registration form
      - See validation errors for invalid fields
    api_calls:
      - method: POST
        endpoint: Supabase Auth signUp
    auth_required: false
  - name: Google Sign-In
    description: Authenticate using Google OAuth via Supabase
    files:
      - lib/screens/login_screen.dart
      - lib/services/supabase_service.dart
    entry_route: /login
    user_interactions:
      - Click Google sign-in button
      - Complete or cancel OAuth flow
    api_calls:
      - method: OAuth
        endpoint: Supabase Auth signInWithOAuth Google
    auth_required: false
  - name: Home Navigation
    description: Navigate between main app sections from the home drawer and bottom areas
    files:
      - lib/screens/home_screen.dart
    entry_route: /home
    user_interactions:
      - Open navigation drawer
      - Tap feed, streamers, messages, notifications, profile, settings, saved posts, live, or painters
      - View unread badge counts on messages and notifications
    api_calls: []
    auth_required: true
  - name: Social Feed
    description: Browse posts, stories, and interact with content
    files:
      - lib/screens/feed_screen.dart
      - lib/services/supabase_service.dart
    entry_route: /feed
    user_interactions:
      - Scroll feed posts
      - Like, repost, share, or save a post
      - Open comments and reply to posts
      - View stories and full-screen media
      - Create a new text, image, video, or voice post
      - Report inappropriate posts
    api_calls:
      - method: GET
        endpoint: Supabase posts table
      - method: POST
        endpoint: Supabase post_likes, post_reposts, post_views tables
    auth_required: true
  - name: Search
    description: Search for users and posts across the platform
    files:
      - lib/screens/search_screen.dart
      - lib/services/supabase_service.dart
    entry_route: /search
    user_interactions:
      - Enter search query
      - View user and post results
      - Open a profile or post from results
    api_calls:
      - method: GET
        endpoint: Supabase search queries and Respect AI search expand backend
    auth_required: true
  - name: Notifications
    description: View and act on app notifications
    files:
      - lib/screens/notifications_screen.dart
      - lib/services/notification_service.dart
      - lib/services/realtime_notification_service.dart
    entry_route: /notifications
    user_interactions:
      - Open notifications list
      - Tap a notification to navigate to related content
      - Mark notifications as read
    api_calls:
      - method: GET
        endpoint: Supabase notifications table
    auth_required: true
  - name: Profile
    description: View and edit user profile information
    files:
      - lib/screens/profile_screen.dart
      - lib/services/supabase_service.dart
    entry_route: /profile
    user_interactions:
      - View avatar, cover, bio, and posts
      - Follow or unfollow users
      - Edit own profile fields
    api_calls:
      - method: GET
        endpoint: Supabase profiles and posts tables
    auth_required: true
  - name: Private Chat
    description: Send and receive direct messages
    files:
      - lib/screens/chat_screen.dart
      - lib/services/supabase_service.dart
    entry_route: /chat
    user_interactions:
      - Open conversation list
      - Select a conversation
      - Type and send a message
    api_calls:
      - method: GET
        endpoint: Supabase messages table
      - method: POST
        endpoint: Supabase messages insert
    auth_required: true
  - name: Settings
    description: Manage app preferences and account settings
    files:
      - lib/screens/settings_screen.dart
      - lib/app/theme_provider.dart
    entry_route: /settings
    user_interactions:
      - Toggle dark or light theme
      - Access account and privacy settings
      - Log out of the app
    api_calls: []
    auth_required: true
  - name: Admin Moderation
    description: Review reports and moderate content for admin users
    files:
      - lib/screens/admin_screen.dart
      - lib/services/supabase_service.dart
    entry_route: /admin
    user_interactions:
      - Open admin panel from drawer
      - Review pending reports
      - Accept or reject moderation actions
    api_calls:
      - method: GET
        endpoint: Supabase reports and moderation tables
    auth_required: true
known_limitations:
  - issue: Flutter web build runs in dev mode; camera, WebRTC, push notifications, and some mobile plugins may not work on web
    location: lib/main.dart
    impact: Live streaming, voice recording, and native push features cannot be fully tested in browser
  - issue: Google Sign-In OAuth popup flow may be blocked or unreliable in automated browser testing
    location: lib/screens/login_screen.dart
    impact: Google login tests may fail unless using email/password credentials
  - issue: Admin panel visibility depends on account role stored in Supabase
    location: lib/screens/home_screen.dart
    impact: Admin tests only work with admin credentials such as configured test user
  - issue: Device ban check runs on startup and can block access for banned devices
    location: lib/app/app.dart
    impact: Tests may show blocked device screen instead of login on restricted environments
