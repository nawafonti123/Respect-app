name: rp_stream_hub
description: Respect App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  shared_preferences: ^2.3.3
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  video_player: ^2.9.2
  video_compress: ^3.1.4
  cached_video_player_plus: ^3.0.3
  webview_flutter: ^4.4.2
  supabase_flutter: ^2.5.6
  record: ^6.0.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  google_sign_in: ^6.2.2
  flutter_local_notifications: ^17.2.4
  http: ^1.2.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6

  # === إضافات WebRTC ===
  flutter_webrtc: ^0.12.0
  permission_handler: ^11.3.1
  camera: ^0.12.0+1
  # نستخدم supabase_realtime المدمج بالفعل في supabase_flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/